<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <title>Burger Website</title>

    <!-- Compiled Tailwind CSS -->
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <!--~~~~~~~~~~ HEADER ~~~~~~~~~~-->
    <header class="bg-primaryColor fixed top-0 left-0 w-full z-50">
      <nav class="container relative h-14 flex justify-between items-center">
        <div>
          <a href="#" class="text-2xl uppercase"
            >Bur<span class="text-secondaryColor font-oswald">ger</span></a
          >
        </div>
        <div
          id="nav-menu"
          class="hidden absolute top-0 left-0 w-full py-14 bg-primaryColor border-b border-secondaryColor md:block md:static md:py-0 md:border-none md:w-auto md:ml-auto"
        >
          <ul class="flex flex-col text-center gap-5 md:flex-row">
            <li>
              <a
                href="#Home"
                class="nav__link"
                class="hover:text-secondaryColor ease-in duration-200"
                >Home</a
              >
            </li>
            <li>
              <a
                href="#about"
                class="nav__link"
                class="hover:text-secondaryColor ease-in duration-200"
                >About Us</a
              >
            </li>
            <li>
              <a
                href="#menu"
                class="nav__link"
                class="hover:text-secondaryColor ease-in duration-200"
                >Menu</a
              >
            </li>
            <li>
              <a
                href="#review"
                class="nav__link"
                class="hover:text-secondaryColor ease-in duration-200"
                >Review</a
              >
            </li>
            <li>
              <a
                href="#contact"
                class="nav__link"
                class="hover:text-secondaryColor ease-in duration-200"
                >Contact</a
              >
            </li>
          </ul>
          <div
            id="nav-close"
            class="absolute top-[0.7rem] right-4 text-2xl cursor-pointer md:hidden"
          >
            <i class="ri-close-line"></i>
          </div>
        </div>
        <div class="flex items-center gap-5">
          <i class="ri-moon-line cursor-pointer ml-4 text-xl"></i>
          <div id="hamburger" class="md:hidden">
            <i class="ri-menu-2-line cursor-pointer text-xl"></i>
          </div>
        </div>
      </nav>
    </header>
    <script src="main.js"></script>
  </body>
</html>
